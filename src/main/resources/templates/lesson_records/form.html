<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>授業記録入力</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4">授業記録入力 - <span th:text="${student.name}"></span></h1>

    <form th:action="@{/lesson-records/save}" th:object="${lessonRecord}" method="post">
        <input type="hidden" th:field="*{studentCode}" th:value="${student.studentCode}" />
        <input type="hidden" th:field="*{mentorCode}" th:value="${currentMentorCode}" />
        <input type="hidden" th:field="*{student.studentCode}" th:value="${student.studentCode}" />
        <input type="hidden" th:field="*{student.name}" th:value="${student.name}" />

        <div class="form-group">
            <label for="typingLevel">タイピング練習に取り組んだ級（レベル）:</label>
            <input type="text" id="typingLevel" th:field="*{typingLevel}" class="form-control" />
        </div>
        <div class="form-group">
            <label for="typingScore">タイピングスコア:</label>
            <input type="number" id="typingScore" th:field="*{typingScore}" class="form-control" />
        </div>
        <div class="form-group">
            <label for="curriculum">実施したカリキュラム:</label>
            <select id="curriculum" th:field="*{curriculum}" class="form-control" required>
                <option value="">選択してください</option>
                <option value="MESH">MESH</option>
                <option value="Scratch">Scratch</option>
                <option value="springing">springing</option>
                <option value="Micro:bit">Micro:bit</option>
                <option value="Python">Python</option>
                <option value="Unity/C#">Unity/C#</option>
                <option value="HTML.SCSS">HTML.SCSS</option>
                <option value="JavaScript">JavaScript</option>
            </select>
        </div>
        <div class="form-group">
            <label for="curriculumDetail">カリキュラム詳細（例: Scratchの「ネコを動かそう」プロジェクト）:</label>
            <textarea id="curriculumDetail" th:field="*{curriculumDetail}" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label for="mentorComment">メンターの感想（200文字程度）:</label>
            <textarea id="mentorComment" th:field="*{mentorComment}" class="form-control" rows="5" maxlength="200" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">AIコメント生成・保存</button>
        <a th:href="@{/students/{studentCode}(studentCode=${student.studentCode})}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
</body>
</html>
