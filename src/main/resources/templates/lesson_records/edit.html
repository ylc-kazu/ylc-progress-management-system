<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AIコメント選択・最終コメント編集</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4">AIコメント選択・最終コメント編集</h1>

    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/lesson-records/finalize}" th:object="${lessonRecord}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{studentCode}" />
        <input type="hidden" th:field="*{mentorCode}" />
        <input type="hidden" th:field="*{lessonDate}" />
        <input type="hidden" th:field="*{startTime}" />
        <input type="hidden" th:field="*{endTime}" />
        <input type="hidden" th:field="*{typingLevel}" />
        <input type="hidden" th:field="*{typingScore}" />
        <input type="hidden" th:field="*{curriculum}" />
        <input type="hidden" th:field="*{curriculumDetail}" />
        <input type="hidden" th:field="*{mentorComment}" />
        <input type="hidden" th:field="*{aiComment1}" />
        <input type="hidden" th:field="*{aiComment2}" />
        <input type="hidden" th:field="*{aiComment3}" />

        <div class="form-group">
            <label>メンターの感想:</label>
            <p th:text="${lessonRecord.mentorComment}" class="form-control-static"></p>
        </div>

        <div class="form-group">
            <label>AI生成コメント:</label>
            <div class="form-check" th:if="${lessonRecord.aiComment1}">
                <input class="form-check-input" type="radio" name="selectedAiComment" id="aiComment1" th:value="${lessonRecord.aiComment1}"
                       onclick="document.getElementById('finalCommentForParent').value = this.value;">
                <label class="form-check-label" for="aiComment1" th:text="${lessonRecord.aiComment1}"></label>
            </div>
            <div class="form-check" th:if="${lessonRecord.aiComment2}">
                <input class="form-check-input" type="radio" name="selectedAiComment" id="aiComment2" th:value="${lessonRecord.aiComment2}"
                       onclick="document.getElementById('finalCommentForParent').value = this.value;">
                <label class="form-check-label" for="aiComment2" th:text="${lessonRecord.aiComment2}"></label>
            </div>
            <div class="form-check" th:if="${lessonRecord.aiComment3}">
                <input class="form-check-input" type="radio" name="selectedAiComment" id="aiComment3" th:value="${lessonRecord.aiComment3}"
                       onclick="document.getElementById('finalCommentForParent').value = this.value;">
                <label class="form-check-label" for="aiComment3" th:text="${lessonRecord.aiComment3}"></label>
            </div>
            <small class="form-text text-muted">選択すると、下の「保護者へ共有する最終コメント」に自動で入力されます。</small>
        </div>

        <div class="form-group">
            <label for="finalCommentForParent">保護者へ共有する最終コメント:</label>
            <textarea id="finalCommentForParent" th:field="*{finalCommentForParent}" class="form-control" rows="5" required></textarea>
            <small class="form-text text-muted">AIコメントを参考に、必要に応じて加筆・修正してください。</small>
        </div>

        <button type="submit" class="btn btn-success">最終コメントを確定</button>
        <a th:href="@{/lesson-records/student/{studentCode}(studentCode=${lessonRecord.studentCode})}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
</body>
</html>
