<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>カリキュラムマスタメンテ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4 bg-light">
<div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
        <h2 class="h5 mb-0">カリキュラムマスター登録</h2>
    </div>
    <div class="card-body">
        <form th:action="@{/master/curriculum/add}" th:object="${curriculum}" method="post">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">管理ID (PK)</label>
                    <input type="text" th:field="*{id}" class="form-control" placeholder="例: MB-01-11-01" required oninput="validateId(this)">
                    <div class="form-text small">
                        命名：[教材略称]-[章]-[頁]-[枝番]<br>(例: MB-01-11-01) ※半角
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">教材名</label>
                    <input type="text" th:field="*{textbookName}" class="form-control" list="textbookOptions" placeholder="選択または入力" required>
                    <datalist id="textbookOptions">
                        <option th:each="name : ${existingTextbooks}" th:value="${name}"></option>
                    </datalist>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">チャプター</label>
                    <input type="text" th:field="*{chapter}" class="form-control" placeholder="Skill 01">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">ページ</label>
                    <input type="number" th:field="*{pageNumber}" class="form-control" min="1" placeholder="1">
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">項目名・ミッション名</label>
                    <input type="text" th:field="*{itemName}" class="form-control" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">AI用説明文</label>
                    <textarea th:field="*{aiDescription}" class="form-control" rows="3"></textarea>
                </div>

                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary px-5">登録する</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-header bg-secondary text-white">
        <h3 class="h6 mb-0">登録済みリスト</h3>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>教材</th>
                <th>章</th>
                <th>項目名</th>
                <th>頁</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${curriculums}">
                <td th:text="${item.id}" class="font-monospace"></td>
                <td th:text="${item.textbookName}"></td>
                <td th:text="${item.chapter}"></td>
                <td th:text="${item.itemName}"></td>
                <td th:text="${item.pageNumber}"></td>
                <td>
                    <form th:action="@{/master/curriculum/delete/{id}(id=${item.id})}" method="post" onsubmit="return confirm('削除しますか？');">
                        <button type="submit" class="btn btn-outline-danger btn-sm">削除</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function validateId(input) {
        // 全角を半角に、小文字を大文字にする
        let val = input.value.replace(/[Ａ-Ｚａ-ｚ０-９－]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).toUpperCase();

        // 許可されない文字を即座に消す
        input.value = val.replace(/[^A-Z0-9-]/g, '');
    }

// 送信時のチェック処理を「強制停止」するように書き換え
document.querySelector('form').addEventListener('submit', function(e) {
    const idInput = document.getElementById('id').value;
    const pageInput = document.getElementById('pageNumber').value;

    // ① 管理IDにハイフンがない場合は、警告を出して「送信を中止」する
    if (!idInput.includes('-')) {
        alert('エラー：管理IDにハイフンが含まれていません。命名規則（例: MB-01-01）に従って入力してください。');
        e.preventDefault(); // 送信を白紙に戻す
        return false;
    }

    // ② ページ数が1未満の場合（念のためのチェック）
    if (pageInput < 1) {
        alert('エラー：ページ数は1以上の数値を入力してください。');
        e.preventDefault();
        return false;
    }
});
</script>
</body>
</html>
