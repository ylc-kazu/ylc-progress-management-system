<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>生徒詳細</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4">生徒詳細 - <span th:text="${student.name}"></span></h1>

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            生徒情報
        </div>
        <div class="card-body">
            <p><strong>生徒コード:</strong> <span th:text="${student.studentCode}"></span></p>
            <p><strong>氏名:</strong> <span th:text="${student.name}"></span></p>
            <p><strong>フリガナ:</strong> <span th:text="${student.furigana}"></span></p>
            <p><strong>ステータス:</strong> <span th:text="${student.status}"></span></p>
            <p><strong>所属教室:</strong> <span th:text="${student.classroomCode}"></span></p>
            <!-- 必要に応じてStudentProfileの情報を追加 -->
            <div th:if="${student.profile != null}">
                <p><strong>ニックネーム:</strong> <span th:text="${student.profile.nickname}"></span></p>
                <p><strong>学年:</strong> <span th:text="${student.profile.gradeText}"></span></p>
                <p><strong>保護者名:</strong> <span th:text="${student.profile.parentName}"></span></p>
                <p><strong>保護者メール1:</strong> <span th:text="${student.profile.parentEmail1}"></span></p>
                <!-- その他のプロフィール情報もここに追加 -->
            </div>
        </div>
    </div>

    <div class="mb-4">
        <a th:href="@{/lesson-records/new/{studentCode}(studentCode=${student.studentCode})}" class="btn btn-success mr-2">新しい授業記録を作成</a>
        <a th:href="@{/lesson-records/student/{studentCode}(studentCode=${student.studentCode})}" class="btn btn-info">授業記録一覧を見る</a>
    </div>

    <a th:href="@{/students}" class="btn btn-secondary">生徒一覧に戻る</a>
</div>
</body>
</html>
