<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <title>生徒マスタ管理</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">👥 生徒データ一括管理</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>✨ 成功:</strong> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>🚨 エラー:</strong> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light">
                <h5 class="card-title mb-0">📁 CSVファイルからの一括登録</h5>
            </div>
            <div class="card-body py-4">
                <p class="text-muted small">指定のフォーマット（CSV形式）の生徒データファイルを選択し、「アップロード」ボタンをクリックしてください。</p>

                <form th:action="@{/students/upload}" method="post" enctype="multipart/form-data" class="row g-3 align-items-center">
                    <div class="col-sm-8">
                        <input class="form-control" type="file" name="file" accept=".csv" required>
                    </div>
                    <div class="col-sm-4">
                        <button type="submit" class="btn btn-primary w-100">📤 アップロードして登録</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <h5 class="card-title mb-0">📝 登録生徒一覧 (大橋校)</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>生徒コード</th>
                        <th>氏名</th>
                        <th>フリガナ</th>
                        <th>ステータス</th>
                        <th>所属教室</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.studentCode}" class="fw-bold"></td>
                        <td th:text="${student.name}"></td>
                        <td th:text="${student.furigana}"></td>
                        <td>
                            <span th:text="${student.status}" class="badge bg-secondary"></span>
                        </td>
                        <td th:text="${student.classroomCode}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="5" class="text-center text-muted py-4">生徒データがありません。上記のCSV一括登録からインポートを行ってください。</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
