<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <title th:text="${config.id == null ? '新しいシフトフォーム設定' : 'シフトフォーム設定を編集'}"></title>
    <style>
        /* 既存のスタイル */
        .slot-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .slot-checkbox-group label {
            background-color: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: .25rem;
            padding: .375rem .75rem;
            cursor: pointer;
            user-select: none;
            transition: all .2s ease-in-out;
        }
        .slot-checkbox-group input[type="checkbox"] {
            display: none;
        }
        .slot-checkbox-group input[type="checkbox"]:checked + label {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        /* 追加スタイル */
        .date-block {
            border: 1px solid #dee2e6;
            border-radius: .25rem;
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #f8f9fa;
        }
        .date-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .date-block-header h5 {
            margin-bottom: 0;
        }
        .remove-date-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: .25rem .5rem;
            border-radius: .25rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2" th:text="${config.id == null ? '🗓️ 新しいシフトフォーム設定' : '🗓️ シフトフォーム設定を編集'}">シフトフォーム設定</h1>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>🚨 エラー:</strong> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/shift-form-configs/save}" th:object="${config}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="formName" class="form-label">フォーム名</label>
                <input type="text" class="form-control" id="formName" th:field="*{formName}" required>
            </div>

            <div class="mb-3">
                <label for="targetMonth" class="form-label">対象月 (管理用)</label>
                <input type="month" class="form-control" id="targetMonth" th:field="*{targetMonth}" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="publishFlag" th:field="*{publishFlag}">
                <label class="form-check-label" for="publishFlag">公開する</label>
            </div>

            <div class="mb-3">
                <label for="remarks" class="form-label">備考 (お知らせ用)</label>
                <textarea class="form-control" id="remarks" th:field="*{remarks}" rows="3"></textarea>
            </div>

            <h4 class="mt-4">シフト希望可能日時の設定</h4>
            <div id="configDatesContainer" th:attr="data-date-index=${config.configDates != null ? config.configDates.size() : 0}">
                <!-- 既存の日付ブロックをレンダリング -->
                <div th:each="configDate, dateStat : *{configDates}" class="date-block">
                    <div class="date-block-header">
                        <h5 th:text="${#temporals.format(configDate.configDate, 'yyyy年MM月dd日 (E)')}"></h5>
                        <button type="button" class="remove-date-btn" onclick="removeDateBlock(this)">削除</button>
                    </div>
                    <input type="hidden" th:name="${'configDates[' + dateStat.index + '].id'}" th:value="${configDate.id}" />
                    <input type="date" th:name="${'configDates[' + dateStat.index + '].configDate'}" th:value="${configDate.configDate}" class="form-control mb-3" required>

                    <div class="slot-checkbox-group">
                        <div th:each="configSlot, slotStat : ${configDate.configSlots}">
                            <input type="checkbox"
                                   th:id="${'slot_' + dateStat.index + '_' + slotStat.index}"
                                   th:name="${'configDates[' + dateStat.index + '].configSlots[' + slotStat.index + '].isAvailableForRequest'}"
                                   th:checked="${configSlot.isAvailableForRequest}" />
                            <label th:for="${'slot_' + dateStat.index + '_' + slotStat.index}" th:text="${configSlot.slotName}"></label>

                            <input type="hidden" th:name="${'configDates[' + dateStat.index + '].configSlots[' + slotStat.index + '].id'}" th:value="${configSlot.id}" />
                            <input type="hidden" th:name="${'configDates[' + dateStat.index + '].configSlots[' + slotStat.index + '].slotName'}" th:value="${configSlot.slotName}" />
                            <input type="hidden" th:name="${'configDates[' + dateStat.index + '].configSlots[' + slotStat.index + '].startTime'}" th:value="${configSlot.startTime}" />
                            <input type="hidden" th:name="${'configDates[' + dateStat.index + '].configSlots[' + slotStat.index + '].endTime'}" th:value="${configSlot.endTime}" />
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" id="addDateButton" class="btn btn-info mt-3">日付を追加</button>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/shift-form-configs}" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    alert('JS loaded!'); // JavaScriptが実行されているか確認するためのアラート

    let dateIndex = parseInt(document.getElementById('configDatesContainer').dataset.dateIndex || '0');
    const configDatesContainer = document.getElementById('configDatesContainer');
    const addDateButton = document.getElementById('addDateButton');

    console.log("Script loaded. Initial dateIndex:", dateIndex);
    console.log("configDatesContainer:", configDatesContainer);
    console.log("addDateButton:", addDateButton);

    addDateButton.addEventListener('click', function() {
        console.log("Add Date button clicked. Current dateIndex:", dateIndex);
        addDateBlock();
    });

    function addDateBlock() {
        console.log("Calling generate-date-block with index:", dateIndex);
        fetch('/shift-form-configs/generate-date-block?index=' + dateIndex)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                return response.text();
            })
            .then(html => {
                console.log("Received HTML fragment:", html);
                const tempDiv = document.createElement('div'); // Use a temporary div to parse HTML
                tempDiv.innerHTML = html;
                const newDateBlockElement = tempDiv.firstElementChild;

                if (newDateBlockElement) {
                    configDatesContainer.appendChild(newDateBlockElement);

                    // 新しく追加された日付入力フィールドにイベントリスナーを設定
                    const newDateInput = newDateBlockElement.querySelector('input[type="date"]');
                    if (newDateInput) {
                        newDateInput.addEventListener('change', updateDateBlockHeader);
                        // デフォルトで今日の日付を設定
                        if (!newDateInput.value) {
                            newDateInput.value = new Date().toISOString().slice(0, 10);
                            // 手動でchangeイベントをトリガーしてヘッダーを更新
                            updateDateBlockHeader({ target: newDateInput });
                        }
                    }
                    dateIndex++;
                    console.log("Date block added. New dateIndex:", dateIndex);
                } else {
                    console.error("No element found in the received HTML fragment.");
                }
            })
            .catch(error => console.error('Error adding date block:', error));
    }

    function updateDateBlockHeader(event) {
        const input = event.target;
        const date = new Date(input.value);
        const headerElement = input.closest('.date-block').querySelector('.date-block-header h5');
        if (!isNaN(date.getTime()) && headerElement) { // getTime()で有効な日付かチェック
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            const formattedDate = date.toLocaleDateString('ja-JP', options).replace(/\//g, '年').replace(' (', '月') + ')';
            headerElement.textContent = formattedDate;
        } else if (headerElement) {
            headerElement.textContent = '新しい日付';
        }
    }

    function removeDateBlock(button) {
        console.log("Remove Date button clicked.");
        button.closest('.date-block').remove();
        // 削除後にインデックスを再調整する必要があるが、複雑になるため、
        // 現状はSpring MVCが自動でリストのギャップを埋めることに期待する
        // または、送信前にJavaScriptでインデックスを再採番するロジックを追加する
    }

    // 既存の日付入力フィールドにイベントリスナーを設定 (編集時ロード用)
    document.querySelectorAll('.date-block input[type="date"]').forEach(input => {
        input.addEventListener('change', updateDateBlockHeader);
        // ページロード時にもヘッダーを更新
        updateDateBlockHeader({ target: input });
    });

    /*]]>*/
</script>

</body>
</html>
