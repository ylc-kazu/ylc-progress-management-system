<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 日付ブロックのフラグメント -->
<div th:fragment="dateBlock" class="date-block">
    <div class="date-block-header">
        <h5 th:text="${#temporals.format(configDate.configDate, 'yyyy年MM月dd日 (E)')}"></h5>
        <button type="button" class="remove-date-btn" onclick="removeDateBlock(this)">削除</button>
    </div>
    <input type="hidden" th:name="${'configDates[' + dateIndex + '].id'}" th:value="${configDate.id}" />
    <input type="date" th:name="${'configDates[' + dateIndex + '].configDate'}" th:value="${configDate.configDate}" class="form-control mb-3" required>

    <div class="slot-checkbox-group">
        <div th:each="configSlot, slotStat : ${configDate.configSlots}">
            <input type="checkbox"
                   th:id="${'slot_' + dateIndex + '_' + slotStat.index}"
                   th:name="${'configDates[' + dateIndex + '].configSlots[' + slotStat.index + '].isAvailableForRequest'}"
                   th:checked="${configSlot.isAvailableForRequest}" />
            <label th:for="${'slot_' + dateIndex + '_' + slotStat.index}" th:text="${configSlot.slotName}"></label>

            <input type="hidden" th:name="${'configDates[' + dateIndex + '].configSlots[' + slotStat.index + '].id'}" th:value="${configSlot.id}" />
            <input type="hidden" th:name="${'configDates[' + dateIndex + '].configSlots[' + slotStat.index + '].slotName'}" th:value="${configSlot.slotName}" />
            <input type="hidden" th:name="${'configDates[' + dateIndex + '].configSlots[' + slotStat.index + '].startTime'}" th:value="${configSlot.startTime}" />
            <input type="hidden" th:name="${'configDates[' + dateIndex + '].configSlots[' + slotStat.index + '].endTime'}" th:value="${configSlot.endTime}" />
        </div>
    </div>
</div>

</body>
</html>
