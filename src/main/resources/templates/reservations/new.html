<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <title>予約データ一括管理</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">🗓️ 予約データ一括管理</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>✨ 成功:</strong> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>🚨 エラー:</strong> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light">
                <h5 class="card-title mb-0">📁 予約CSVファイルの一括登録</h5>
            </div>
            <div class="card-body py-4">
                <p class="text-muted small">本部システムから出力した予約情報CSVファイルを選択し、「アップロード」ボタンをクリックしてください。</p>

                <form th:action="@{/reservations/import}" method="post" enctype="multipart/form-data" class="row g-3 align-items-center">
                    <div class="col-sm-8">
                        <input class="form-control" type="file" name="file" accept=".csv" required>
                    </div>
                    <div class="col-sm-4">
                        <button type="submit" class="btn btn-primary w-100">📤 アップロードして登録</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
