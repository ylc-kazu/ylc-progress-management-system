<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <title>予約一覧</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">🗓️ 予約一覧</h1>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0" style="font-size: 14px;">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-3">開講日</th>
                            <th>時間</th>
                            <th>クラス名</th>
                            <th>コース名</th>
                            <th>生徒コード</th>
                            <th>生徒名</th>
                            <th>CSV講師</th>
                            <th style="width: 180px;">担当メンター</th>
                            <th>校舎</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="res : ${reservations}">
                            <td class="ps-3" th:text="${res.lessonDate}">開講日</td>
                            <td>
                                <span th:text="${res.startTime != null ? res.startTime : '--:--'}">開始時間</span>
                                <span> 〜 </span>
                                <span th:text="${res.endTime != null ? res.endTime : '--:--'}">終了時間</span>
                            </td>
                            <td th:text="${res.className}">クラス名</td>
                            <td th:text="${res.courseName}">コース名</td>
                            <td th:text="${res.studentCode}">生徒コード</td>

                            <td>
                                <span th:text="${res.studentName != null ? res.studentName : '-'}">生徒名</span>

                                <span th:if="${studentStatusMap[res.studentCode] == 'ChatGPT NG'}"
                                      class="badge bg-danger ms-1 text-white fw-bold animate__animated animate__flash"
                                      style="font-size: 11px; letter-spacing: 0.5px;">
                                    ⚠️ AI使用NG
                                </span>

                                <span th:if="${!studentStatusMap.containsKey(res.studentCode)}"
                                      class="badge bg-warning text-dark ms-1 fw-bold">
                                    ❌ 生徒未登録エラー
                                </span>
                            </td>

                            <td th:text="${res.teacher != null && res.teacher != '' ? res.teacher : '-'}">講師名</td>

                            <td>
                                <select class="form-select form-select-sm select-mentor"
                                        th:data-reservation-id="${res.id}"
                                        style="font-size: 13px;">
                                    <option value="">-- 未割当 --</option>
                                    <option th:each="mentor : ${mentors}"
                                            th:value="${mentor.mentorCode}"
                                            th:text="${mentor.name}"
                                            th:selected="${res.mentorCode != null and mentor.mentorCode == res.mentorCode}">
                                    </option>
                                </select>
                            </td>

                            <td th:text="${res.campus}">校舎名</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reservations)}">
                            <td colspan="9" class="text-center py-4 text-muted">予約データが登録されていません。</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mentorSelects = document.querySelectorAll('.select-mentor');

            mentorSelects.forEach(function(selectElement) {
                selectElement.addEventListener('change', function(event) {
                    const el = event.target;
                    const reservationId = el.getAttribute('data-reservation-id');
                    const selectedMentorCode = el.value;

                    el.disabled = true;

                    fetch('/api/reservations/assign-mentor', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: `reservationId=${reservationId}&mentorCode=${selectedMentorCode}`
                    })
                        .then(response => {
                            if (response.ok) {
                                el.style.borderColor = '#198754';
                                el.style.boxShadow = '0 0 0 0.25rem rgba(25, 135, 84, 0.25)';
                                setTimeout(() => {
                                    el.style.borderColor = '';
                                    el.style.boxShadow = '';
                                }, 1000);
                            } else {
                                alert('メンターの割り当て保存に失敗しました。');
                                location.reload();
                            }
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            alert('通信エラーが発生しました。');
                        })
                        .finally(() => {
                            // 生徒未登録の行でなければ再有効化
                            if (el.getAttribute('disabled') === null) {
                                el.disabled = false;
                            }
                        });
                });
            });
        });
    </script>
</div> </body>
</html>
